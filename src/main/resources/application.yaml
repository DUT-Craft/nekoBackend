server:
  port: 8020

security:
  jwt:
    secret: ${JWT_SECRET:neko-backend-local-dev-secret-2026-change-me}
    issuer: ${JWT_ISSUER:NekoBackend}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:7200}

neko:
  okhttp:
    connect-timeout: ${OKHTTP_CONNECT_TIMEOUT:5s}
    read-timeout: ${OKHTTP_READ_TIMEOUT:15s}
    write-timeout: ${OKHTTP_WRITE_TIMEOUT:15s}
    call-timeout: ${OKHTTP_CALL_TIMEOUT:30s}
    max-idle-connections: ${OKHTTP_MAX_IDLE_CONNECTIONS:20}
    keep-alive-duration: ${OKHTTP_KEEP_ALIVE_DURATION:5m}
    retry-on-connection-failure: ${OKHTTP_RETRY_ON_CONNECTION_FAILURE:true}

management:
  endpoint:
    health:
      show-components: always
      show-details: always
    info:
      enabled: true
    metrics:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    process:
      enabled: true
  metrics:
    enable:
      executor: true
      hikaricp: true
      jdbc: true
      jvm: true
      logback: true
      process: true
      rabbitmq: true
      system: true
  endpoints:
    web:
      exposure:
        # 对外暴露的 Actuator 端点列表
        include:
          # 健康检查端点
          - health
          # 指标采集端点
          - metrics
          # 应用信息端点
          - info
          # 配置刷新端点
          - refresh

spring:
  application:
    name: NekoBackend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 2000
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: create  # 每次启动时重新创建表结构
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:4}
      timeout: ${REDIS_TIMEOUT:10000ms}
